version: 2

project_name: notioncrawl

builds:
  - id: notioncrawl
    main: ./cmd/notioncrawl
    binary: notioncrawl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: bundles
    ids:
      - notioncrawl
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - SPEC.md
      - config.example.toml

checksum:
  name_template: "sha256sums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^Merge pull request"
      - "^Merge branch"

nfpms:
  - id: linux-packages
    ids:
      - notioncrawl
    package_name: notioncrawl
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: https://github.com/vincentkoc/notioncrawl
    maintainer: Vincent Koc <vincent@vincentkoc.com>
    description: Local-first Notion crawler into SQLite and normalized Markdown.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    section: utils
    priority: optional
    contents:
      - src: ./README.md
        dst: /usr/share/doc/notioncrawl/README.md
      - src: ./LICENSE
        dst: /usr/share/doc/notioncrawl/LICENSE
      - src: ./config.example.toml
        dst: /usr/share/doc/notioncrawl/config.example.toml
